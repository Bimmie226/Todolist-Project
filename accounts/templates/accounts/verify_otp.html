{% load static %}
<!doctype html>
<html>
  <head>
    <title>Xác nhận OTP</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      #resend-btn {
        background: none;
        border: none;
        padding: 0;
        color: #0d6efd;
        cursor: pointer;
        text-decoration: underline;
        font-size: 0.9rem;
      }
      #resend-btn:disabled {
        color: #6c757d;
        text-decoration: none;
        cursor: default;
      }
      #countdown {
        font-size: 0.9rem;
        color: #6c757d;
      }
    </style>
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="card mx-auto p-4" style="width: 400px">
        <h3 class="text-center mb-4">Nhập mã OTP</h3>

        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
          {% endfor %}
        {% endif %}

        <form method="POST">
          {% csrf_token %}

          <div class="mb-3">
            <label>Mã OTP</label>
            <input type="text" name="otp" class="form-control" required />
          </div>

          <button class="btn btn-success w-100">Xác nhận</button>
        </form>

        <div class="text-center mt-3">
          <span id="countdown">Gửi lại sau <strong id="timer">60</strong>s</span>

          <form method="POST" action="{% url 'resend_otp' %}" id="resend-form" style="display:inline;">
            {% csrf_token %}
            <button
              type="submit"
              id="resend-btn"
              disabled
              style="display: none;"
            >
              Gửi lại mã OTP
            </button>
          </form>
        </div>
      </div>
    </div>

    <script>
      let seconds = 60;
      const timerEl = document.getElementById("timer");
      const countdownEl = document.getElementById("countdown");
      const resendBtn = document.getElementById("resend-btn");

      const interval = setInterval(() => {
        seconds--;
        timerEl.textContent = seconds;

        if (seconds <= 0) {
          clearInterval(interval);
          countdownEl.style.display = "none";
          resendBtn.style.display = "inline";
          resendBtn.disabled = false;
        }
      }, 1000);
    </script>
  </body>
</html>

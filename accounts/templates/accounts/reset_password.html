{% load static %}
<!doctype html>
<html>
  <head>
    <title>Đặt lại mật khẩu</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="card mx-auto p-4" style="width: 400px">
        <h3 class="text-center mb-4">Đặt lại mật khẩu</h3>

        <form method="POST">
          {% csrf_token %}

          <div class="mb-3">
            <label>Mật khẩu mới</label>
            <input
              type="password"
              name="password"
              class="form-control"
              required
            />
          </div>

          <button class="btn btn-danger w-100">Đổi mật khẩu</button>
        </form>
      </div>
    </div>
  </body>
</html>

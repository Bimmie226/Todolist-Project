services: 
  backend: 
    build: . 
    container_name: django_app
    expose: 
      - 8000
    depends_on: 
      - db 

  nginx: 
    image: nginx:alpine
    container_name: django_nginx
    ports: 
      - "80:80"
    volumes: 
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on: 
      - backend

  db: 
    image: mysql:latest 
    container_name: django_mysql
    environment: 
      MYSQL_DATABASE: todolist_db
      MYSQL_ROOT_PASSWORD: root 
    volumes: 
      - mysql_data:/var/lib/mysql 
      - ./database/todolist_db.sql:/docker-entrypoint-initdb.d/todolist_db.sql

volumes: 
  mysql_data: